<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>딸깍아케이드 — 게임 모음집</title>
    <meta name="description" content="딸깍아케이드 — 귀엽고 재미있는 게임 모음집. 지금 바로 플레이하세요!">
    <meta property="og:title" content="딸깍아케이드 — 게임 모음집">
    <meta property="og:description" content="귀엽고 재미있는 게임 모음집. 지금 바로 플레이하세요!">
    <meta property="og:image" content="https://ttalggak-arcade.vercel.app/assets/images/thumb-main.png">
    <meta property="og:url" content="https://ttalggak-arcade.vercel.app/">
    <meta property="og:type" content="website">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --neon-pink: #ff2d78;
            --neon-cyan: #00f5ff;
            --neon-yellow: #ffe600;
            --neon-purple: #b84fff;
            --bg-dark: #0a0a1a;
            --card-bg: #12122a;
            --card-border: #2a2a50;
        }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            background-image:
                /* 오피스 모니터 감성의 스틸 블루 글로우 */
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(144, 202, 249, 0.15) 0%, transparent 70%),
                linear-gradient(180deg, #0a0a1a 0%, #0d0d2b 100%);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* 배경 보케 효과 및 CRT 스캔라인 오버레이 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                /* 보케 (Bokeh) */
                radial-gradient(1px 1px at 10% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 15%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 50%, rgba(255, 255, 255, 0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 90%, rgba(255, 255, 255, 0.2) 0%, transparent 100%),
                /* CRT 스캔라인 텍스처 (오피스 복고 감성) */
                repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.1),
                    rgba(0, 0, 0, 0.1) 1px,
                    transparent 1px,
                    transparent 2px);
            pointer-events: none;
            z-index: 5;
            /* 얇은 노이즈가 컨텐츠 위를 살짝 덮도록 조정 */
        }

        /* 3D 사내 인트라넷 감성 그리드 (톤다운) */
        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(600px) rotateX(65deg) translateY(0);
            animation: gridMove 15s linear infinite;
            pointer-events: none;
            z-index: 0;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 50%);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 50%);
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        /* ── 헤더 ── */
        header {
            text-align: center;
            padding: 60px 0 40px;
        }

        .logo-wrap {
            display: inline-block;
            position: relative;
        }

        .logo-subtitle {
            font-family: 'NeoDunggeunmo', monospace;
            font-size: 14px;
            color: #ff5252;
            letter-spacing: 1px;
            margin-bottom: 24px;
            display: inline-block;
            /* 경고 라벨 스타일 */
            padding: 6px 14px;
            border-radius: 4px;
            border: 1px solid rgba(255, 82, 82, 0.4);
            background: rgba(255, 82, 82, 0.1);
            animation: blink 2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .logo-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 400;
            line-height: 1.4;
            letter-spacing: 2px;
            color: #fff;
            position: relative;
            z-index: 2;
            text-transform: uppercase;
        }

        /* 📸 절제된 세련미의 글리치 효과 (Toned down) */
        .logo-title::before,
        .logo-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.9;
        }

        .logo-title::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 8s infinite linear alternate-reverse;
        }

        .logo-title::after {
            left: -2px;
            text-shadow: 2px 0 #00fff9;
            animation: glitch-anim2 4s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {

            0%,
            100% {
                clip: rect(40px, 9999px, 42px, 0);
                transform: translateX(0);
            }

            20% {
                clip: rect(20px, 9999px, 20px, 0);
                transform: translateX(1px);
            }

            40% {
                clip: rect(60px, 9999px, 80px, 0);
                transform: translateX(-1px);
            }

            60% {
                clip: rect(10px, 9999px, 15px, 0);
                transform: translateX(1px);
            }

            80% {
                clip: rect(80px, 9999px, 90px, 0);
                transform: translateX(-1px);
            }
        }

        @keyframes glitch-anim2 {

            0%,
            100% {
                clip: rect(10px, 9999px, 100px, 0);
                transform: translateX(0);
            }

            25% {
                clip: rect(0px, 9999px, 5px, 0);
                transform: translateX(-1px);
            }

            50% {
                clip: rect(50px, 9999px, 55px, 0);
                transform: translateX(1px);
            }

            75% {
                clip: rect(80px, 9999px, 85px, 0);
                transform: translateX(-1px);
            }
        }

        @keyframes pulseTitle {
            0% {
                filter: brightness(1);
            }

            100% {
                filter: brightness(1.2) drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            }
        }

        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 40px 0 36px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(144, 202, 249, 0.4), transparent);
        }

        .divider span {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #90caf9;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        /* ── 게임 그리드 ── */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* 게임 카드 */
        .game-card {
            position: relative;
            background: rgba(25, 28, 41, 0.6);
            /* 오피스 컨셉에 맞춘 차분한 네이비 톤 */
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            /* 세련된 반투명 라인 */
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.5s ease-out, box-shadow 0.25s ease, border-color 0.25s ease;
            display: block;
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .game-card.active:hover {
            /* 형광펜(하이라이터)를 연상시키는 라임/사이버 옐로우 샤도우 (오피스 컨셉) */
            box-shadow: 0 15px 35px rgba(200, 255, 0, 0.15), 0 0 0 1px rgba(200, 255, 0, 0.5);
            border-color: rgba(200, 255, 0, 0.6);
        }

        .game-card.active:hover .card-thumbnail {
            transform: scale(1.06);
        }

        .card-thumbnail-wrap {
            height: 180px;
            overflow: hidden;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
        }

        /* 썸네일 영역 스켈레톤 애니메이션 */
        .game-card.is-loading .card-thumbnail-wrap::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.15),
                    transparent);
            animation: skeleton-sweep 1.5s infinite ease-in-out;
            pointer-events: none;
        }

        .game-card.is-loading .card-thumbnail {
            opacity: 0;
        }

        @keyframes skeleton-sweep {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .card-thumbnail {
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease, opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        /* 예산 런 게임 썸네일 배경 */
        .thumb-budget-run {
            background-image: url('/assets/images/thumb-budget-run.png');
            background-size: cover;
            background-position: center;
        }

        /* 티슈 게임 썸네일 배경 */
        .thumb-soju {
            background-image: url('/assets/images/thumb-soju.png');
            background-size: cover;
            background-position: center;
        }

        .thumb-tissue {
            background-image: url('/assets/images/thumb-tissue.png');
            background-size: cover;
            background-position: center;
        }

        /* 결재 게임 썸네일 배경 */
        .thumb-gyeoljae {
            background-image: url('/assets/images/thumb-gyeoljae.png');
            background-size: cover;
            background-position: center;
        }

        /* 차돌박이 게임 썸네일 배경 */
        .thumb-brisket-master {
            background-image: url('/assets/images/thumb-brisket-master.png');
            background-size: cover;
            background-position: center;
        }

        /* 곧 출시 카드 */
        .game-card.coming-soon {
            opacity: 0.55;
            cursor: default;
        }

        .coming-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(200, 255, 0, 0.15);
            /* 형광펜 색 통일 */
            border: 1px solid rgba(200, 255, 0, 0.8);
            color: #c8ff00;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 5px 10px;
            border-radius: 4px;
            /* 형광펜 사각 느낌 */
            transition: opacity 0.3s ease;
        }

        .play-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(200, 255, 0, 0.15);
            /* 형광펜 색 통일 */
            border: 1px solid rgba(200, 255, 0, 0.8);
            color: #c8ff00;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 5px 10px;
            border-radius: 4px;
            /* 사무적인 느낌으로 살짝 각지게 */
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.3s ease;
        }

        /* 로딩 중일 때는 배지 숨김 */
        .game-card.is-loading .play-badge,
        .game-card.is-loading .coming-badge {
            opacity: 0;
            pointer-events: none;
        }

        .play-badge::before {
            content: '▶';
            font-size: 7px;
        }

        .card-body {
            padding: 18px 20px 22px;
            border-top: 1px solid var(--card-border);
        }

        /* 태그 래퍼: 여러 태그를 가로로 배치 */
        .tags-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .card-tag {
            font-family: 'NeoDunggeunmo', 'Press Start 2P', monospace;
            font-size: 12px;
            color: #90caf9;
            /* 사무적인 블루 계열 */
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.6;
        }

        /* 푸터 */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 60px;
            padding: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        footer p {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            line-height: 2;
        }

        /* 코인 카운터 장식 */
        .coin-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .coin-bar span {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--neon-yellow);
        }



        @media (max-width: 480px) {
            header {
                padding: 40px 0 30px;
            }

            .logo-subtitle {
                font-size: 12px;
                padding: 4px 12px;
                margin-bottom: 20px;
            }

            .logo-title {
                font-size: clamp(26px, 9vw, 36px);
                line-height: 1.2;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-wrap">
                <span class="logo-subtitle">※주의※ 회사에서 당당하게 하지 마시오.</span>
                <h1 class="logo-title" data-text="TTALGGAK ARCADE">TTALGGAK ARCADE</h1>
            </div>
        </header>

        <div class="divider"><span>★ GAME SELECT ★</span></div>

        <main>
            <div class="games-grid">

                <!-- main.js에서 JS 동적 렌더링으로 카드를 주입합니다 -->

            </div>
        </main>

        <footer>
            <div class="coin-bar">
                <span>🪙 CREDIT : 99</span>
            </div>
            <p>© 2026 TTALGGAK ARCADE · ALL RIGHTS RESERVED</p>
        </footer>
    </div>
    <script type="module" src="/main.js"></script>
</body>

</html>
