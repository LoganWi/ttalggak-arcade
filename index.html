<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>딸깍아케이드 — 게임 모음집</title>
    <meta name="description" content="딸깍아케이드 — 귀엽고 재미있는 게임 모음집. 지금 바로 플레이하세요!">
    <meta property="og:title" content="딸깍아케이드 — 게임 모음집">
    <meta property="og:description" content="귀엽고 재미있는 게임 모음집. 지금 바로 플레이하세요!">
    <meta property="og:image" content="https://ttalggak-arcade.vercel.app/assets/images/thumb-main.png">
    <meta property="og:url" content="https://ttalggak-arcade.vercel.app/">
    <meta property="og:type" content="website">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --neon-pink: #ff2d78;
            --neon-cyan: #00f5ff;
            --neon-yellow: #ffe600;
            --neon-purple: #b84fff;
            --bg-dark: #0a0a1a;
            --card-bg: #12122a;
            --card-border: #2a2a50;
        }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(184, 79, 255, 0.25) 0%, transparent 70%),
                linear-gradient(180deg, #0a0a1a 0%, #0d0d2b 100%);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* 배경 별 효과 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255, 255, 255, 0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 70%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 15%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 50%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 85%, rgba(255, 255, 255, 0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 30%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 90%, rgba(255, 255, 255, 0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 75%, rgba(255, 255, 255, 0.4) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* 3D 사이버 그리드 */
        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(0, 245, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(0);
            animation: gridMove 10s linear infinite;
            pointer-events: none;
            z-index: 0;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 60%);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 60%);
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        /* ── 헤더 ── */
        header {
            text-align: center;
            padding: 60px 0 40px;
        }

        .logo-wrap {
            display: inline-block;
            position: relative;
        }

        .logo-subtitle {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 24px;
            display: block;
        }

        .logo-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 400;
            line-height: 1.4;
            letter-spacing: 2px;
            color: #ffeb3b;
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.7);
            text-shadow:
                0px 2px 0px #e53935,
                0px 4px 0px #e53935,
                0px 6px 0px #b71c1c,
                0px 8px 0px #b71c1c,
                0px 10px 0px rgba(0, 0, 0, 0.8),
                0px 15px 25px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 2;
        }

        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 40px 0 36px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-purple), transparent);
        }

        .divider span {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--neon-purple);
            white-space: nowrap;
        }

        /* ── 게임 그리드 ── */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* 게임 카드 */
        .game-card {
            position: relative;
            background: rgba(18, 18, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.5s ease-out, box-shadow 0.25s ease, border-color 0.25s ease;
            display: block;
            transform-style: preserve-3d;
        }

        .game-card.active:hover {
            box-shadow: 0 20px 40px rgba(255, 45, 120, 0.25), 0 0 0 1px rgba(255, 45, 120, 0.7);
            border-color: rgba(255, 45, 120, 0.7);
        }

        .game-card.active:hover .card-thumbnail {
            transform: scale(1.06);
        }

        .card-thumbnail-wrap {
            height: 180px;
            overflow: hidden;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
        }

        /* 썸네일 영역 스켈레톤 애니메이션 */
        .card-thumbnail-wrap::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.15),
                    transparent);
            animation: skeleton-sweep 1.5s infinite ease-in-out;
            pointer-events: none;
        }

        .card-thumbnail {
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        /* 티슈 게임 썸네일 배경 */
        .thumb-soju {
            background-image: url('/assets/images/thumb-soju.png');
            background-size: cover;
            background-position: center;
        }

        .thumb-tissue {
            background-image: url('/assets/images/thumb-tissue.png');
            background-size: cover;
            background-position: center;
        }

        /* 결재 게임 썸네일 배경 */
        .thumb-gyeoljae {
            background-image: url('/assets/images/thumb-gyeoljae.png');
            background-size: cover;
            background-position: center;
        }

        /* 차돌박이 게임 썸네일 배경 */
        .thumb-brisket-master {
            background-image: url('/assets/images/thumb-brisket-master.png');
            background-size: cover;
            background-position: center;
        }

        /* 곧 출시 카드 */
        .game-card.coming-soon {
            opacity: 0.55;
            cursor: default;
        }

        .coming-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255, 230, 0, 0.15);
            border: 1px solid var(--neon-yellow);
            color: var(--neon-yellow);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 5px 10px;
            border-radius: 20px;
            transition: opacity 0.3s ease;
        }

        .play-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255, 45, 120, 0.2);
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 5px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.3s ease;
        }

        /* 로딩 중일 때는 배지 숨김 */
        .game-card.is-loading .play-badge,
        .game-card.is-loading .coming-badge {
            opacity: 0;
            pointer-events: none;
        }

        .play-badge::before {
            content: '▶';
            font-size: 7px;
        }

        .card-body {
            padding: 18px 20px 22px;
            border-top: 1px solid var(--card-border);
        }

        /* 태그 래퍼: 여러 태그를 가로로 배치 */
        .tags-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .card-tag {
            font-family: 'NeoDunggeunmo', 'Press Start 2P', monospace;
            font-size: 14px;
            color: var(--neon-cyan);
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.6;
        }

        /* 푸터 */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 60px;
            padding: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        footer p {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            line-height: 2;
        }

        /* 코인 카운터 장식 */
        .coin-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .coin-bar span {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--neon-yellow);
        }



        @media (max-width: 480px) {
            header {
                padding: 40px 0 30px;
            }

            .logo-title {
                font-size: 22px;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-wrap">
                <span class="logo-subtitle">HYPER-CASUAL HUB</span>
                <h1 class="logo-title">TTALGGAK ARCADE</h1>
            </div>
        </header>

        <div class="divider"><span>★ GAME SELECT ★</span></div>

        <main>
            <div class="games-grid">

                <!-- main.js에서 JS 동적 렌더링으로 카드를 주입합니다 -->

            </div>
        </main>

        <footer>
            <div class="coin-bar">
                <span>🪙 CREDIT : 99</span>
            </div>
            <p>© 2026 딸깍아케이드 · ALL RIGHTS RESERVED</p>
        </footer>
    </div>
    <script type="module" src="/main.js"></script>
</body>

</html>
