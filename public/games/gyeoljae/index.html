<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>결재해 주세요! — 딸깍아케이드</title>
    <meta property="og:title" content="결재해 주세요!">
    <meta property="og:description" content="결재판을 아래로 당겨 부장님께 날려버리세요! 3D 슬링샷 액션.">
    <meta property="og:image" content="https://ttalggak-arcade.vercel.app/assets/images/thumb-gyeoljae.png">
    <meta property="og:url" content="https://ttalggak-arcade.vercel.app/games/gyeoljae/">
    <meta property="og:type" content="website">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            touch-action: none;
            font-family: 'NeoDunggeunmo', monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            z-index: 30;
        }

        .pointer-events-auto {
            pointer-events: auto;
        }

        .pixel-btn {
            background-color: #ef4444;
            color: #fff;
            border: 4px solid #fff;
            box-shadow: 4px 4px 0 #000;
            padding: 10px 20px;
            font-family: 'NeoDunggeunmo', monospace;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        .pixel-text {
            text-shadow: 3px 3px 0 #000;
        }

        #home-btn {
            background-color: #334155;
            color: #fff;
            border: 4px solid #94a3b8;
            box-shadow: 4px 4px 0 #000;
            padding: 8px;
            transition: transform 0.1s;
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        #home-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        #fail-overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
        }

        #fail-overlay.show {
            display: flex;
        }

        #fail-title-text {
            color: #ef4444;
            font-size: 5rem;
            margin-bottom: 1.5rem;
            text-shadow: 4px 4px 0 #000;
        }

        #fail-desc-text {
            color: #fff;
            font-size: 1.25rem;
            text-align: center;
            line-height: 1.6;
            white-space: pre-line;
            text-shadow: 2px 2px 0 #000;
            padding: 0 1rem;
        }

        #hit-bubble {
            position: absolute;
            display: none;
            pointer-events: none;
            z-index: 25;
            transform: translate(-50%, -100%);
            text-align: center;
        }

        #hit-bubble.show {
            display: block;
        }

        #hit-bubble .bubble-text {
            background: #fff;
            border: 4px solid #000;
            box-shadow: 3px 3px 0 #000;
            color: #ef4444;
            font-family: 'NeoDunggeunmo', monospace;
            font-size: 18px;
            padding: 10px 18px;
            white-space: nowrap;
            display: inline-block;
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <div id="fail-overlay">
        <h2 id="fail-title-text">FAIL</h2>
        <p id="fail-desc-text"></p>
    </div>

    <div id="hit-bubble">
        <div class="bubble-text" id="hit-bubble-text"></div>
    </div>

    <div id="ui-layer">
        <!-- 상단 헤더 영역 -->
        <div class="relative w-full text-center">
            <!-- HOME 버튼 (아주 살짝만 띄우기 위해 -left-6 -top-6 사용) -->
            <a href="/" id="home-btn" class="absolute -left-6 -top-6 w-12 h-12" title="HOME">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>

            <!-- 타이틀은 절대적 중앙 정렬 -->
            <h1 class="text-3xl md:text-5xl text-yellow-400 tracking-tighter pixel-text inline-block">
                결재해 주세요!
            </h1>
            <p id="instruction" class="text-black mt-4 text-sm md:text-base animate-pulse"
                style="text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">
                👇 결재판을 아래로 당겨서 날려버리세요!
            </p>
        </div>

        <div class="flex justify-center mb-16 pointer-events-auto">
            <button id="resetBtn" class="hidden pixel-btn text-xl">
                RESTART
            </button>
        </div>
    </div>

    <script type="module">
        import { trackPlayCount } from "/api-playcount.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('resetBtn');
        const instruction = document.getElementById('instruction');
        const failOverlay = document.getElementById('fail-overlay');
        const failTitleText = document.getElementById('fail-title-text');
        const failDescText = document.getElementById('fail-desc-text');
        const hitBubble = document.getElementById('hit-bubble');
        const hitBubbleText = document.getElementById('hit-bubble-text');
        const homeBtn = document.getElementById('home-btn');

        const INTERNAL_HEIGHT = 360;
        let width, height;

        let state = 'idle'; // idle, flying, exploded, missed, round_clear, game_clear
        let failMessage = '';
        let currentRound = 1;
        const MAX_ROUNDS = 5;

        const FOCAL_LENGTH = 350;
        const GRAVITY = 1.2;
        const GRAVITY_PAPER = 0.2;
        const AIR_FRICTION = 0.96;
        const FLOOR_Y = -120;
        const CEILING_Y = 350;

        function project(x, y, z) {
            const scale = FOCAL_LENGTH / Math.max(1, FOCAL_LENGTH + z);
            const sx = width / 2 + x * scale;
            const sy = height / 2 - y * scale;
            return { sx, sy, scale };
        }

        let folder;
        let boss;
        let desk;
        let wall;
        let sideDesks = [];
        let cabinets = [];
        let papers = [];
        let particles = [];
        let plant;
        let golfBag;

        function resize() {
            const ratio = window.innerWidth / window.innerHeight;
            height = INTERNAL_HEIGHT;
            width = Math.floor(INTERNAL_HEIGHT * ratio);
            canvas.width = width;
            canvas.height = height;
            ctx.imageSmoothingEnabled = false;
            if (state === 'idle' && !folder) initGame();
        }
        window.addEventListener('resize', resize);

        // Sprite Caching for static assets
        const SpriteCache = {
            canvases: {},
            get(id, drawFunc, w, h) {
                if (!this.canvases[id]) {
                    const c = document.createElement('canvas');
                    c.width = w; c.height = h;
                    const cctx = c.getContext('2d');
                    cctx.imageSmoothingEnabled = false;
                    drawFunc(cctx);
                    this.canvases[id] = c;
                }
                return this.canvases[id];
            },
            clear() { this.canvases = {}; }
        };

        class BackWall {
            constructor() {
                this.z = 7500;
                this.cachedCanvas = SpriteCache.get('BackWall', (ctx) => {
                    ctx.fillStyle = '#7a96b4';
                    ctx.fillRect(0, 0, 6000, 620);
                    ctx.fillStyle = '#4c647c';
                    ctx.fillRect(1800, 100, 2400, 450);
                    ctx.fillStyle = '#a0e4fa';
                    ctx.fillRect(1840, 130, 2320, 390);
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(1840, 130, 2320, 390);
                    ctx.clip();
                    ctx.fillStyle = '#78c6e3';
                    const bld = [[2000, 400, 200, 300], [2250, 350, 150, 400], [2450, 450, 300, 300], [2900, 300, 250, 400], [3200, 420, 200, 300], [3500, 320, 300, 400], [3850, 380, 250, 300]];
                    bld.forEach(b => ctx.fillRect(b[0], b[1], b[2], b[3]));
                    ctx.fillStyle = '#55a1be';
                    const bld2 = [[1900, 520, 250, 300], [2200, 500, 150, 400], [2400, 550, 300, 300], [2800, 480, 250, 400], [3150, 580, 200, 300], [3450, 450, 350, 400], [3900, 540, 200, 300]];
                    bld2.forEach(b => ctx.fillRect(b[0], b[1], b[2], b[3]));
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.fillRect(2200, 250, 200, 30); ctx.fillRect(2300, 220, 100, 30);
                    ctx.fillRect(3300, 200, 250, 40); ctx.fillRect(3350, 160, 150, 40);
                    ctx.restore();
                    ctx.fillStyle = '#394d63';
                    ctx.fillRect(2980, 100, 40, 450);
                    ctx.fillRect(1800, 400, 2400, 20);
                }, 6000, 620);
            }
            draw() {
                let p = project(0, 0, this.z);
                if (p.scale <= 0) return;
                ctx.save();
                ctx.translate(p.sx, p.sy);
                ctx.scale(p.scale, p.scale);
                ctx.drawImage(this.cachedCanvas, -3000, -500);
                ctx.restore();
            }
        }

        class DisplayCabinet {
            constructor(x, z) {
                this.x = x; this.y = FLOOR_Y; this.z = z;
                this.cachedCanvas = SpriteCache.get('Cabinet', (ctx) => {
                    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
                    ctx.fillStyle = '#450a0a'; ctx.fillRect(0, -500, 800, 500); ctx.strokeRect(0, -500, 800, 500);
                    ctx.fillStyle = '#2e0707';
                    ctx.fillRect(20, -350, 760, 20); ctx.strokeRect(20, -350, 760, 20);
                    ctx.fillRect(20, -200, 760, 20); ctx.strokeRect(20, -200, 760, 20);
                    ctx.fillStyle = '#b45309'; ctx.fillRect(100, -480, 100, 130); ctx.strokeRect(100, -480, 100, 130);
                    ctx.fillStyle = '#fef3c7'; ctx.fillRect(120, -460, 60, 90);
                    ctx.fillStyle = '#fbbf24'; ctx.fillRect(140, -400, 20, 20);
                    ctx.fillStyle = '#b45309'; ctx.fillRect(250, -460, 140, 110); ctx.strokeRect(250, -460, 140, 110);
                    ctx.fillStyle = '#fef3c7'; ctx.fillRect(270, -440, 100, 70);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(330, -400, 20, 20);
                    ctx.fillStyle = '#f59e0b';
                    ctx.beginPath(); ctx.moveTo(550, -370); ctx.lineTo(500, -460); ctx.lineTo(600, -460); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(550, -460, 50, 0, Math.PI, false); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#78350f'; ctx.fillRect(510, -370, 80, 20); ctx.strokeRect(510, -370, 80, 20);
                    ctx.fillStyle = 'rgba(253, 230, 138, 0.6)';
                    ctx.fillRect(150, -330, 120, 130); ctx.strokeRect(150, -330, 120, 130);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(180, -350, 60, 20); ctx.strokeRect(180, -350, 60, 20);
                    ctx.fillStyle = '#d97706'; ctx.beginPath(); ctx.moveTo(210, -210); ctx.lineTo(180, -260); ctx.lineTo(220, -310); ctx.lineTo(240, -250); ctx.fill();
                    ctx.fillStyle = '#0f172a'; ctx.fillRect(400, -320, 70, 120); ctx.strokeRect(400, -320, 70, 120);
                    ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.moveTo(400, -240); ctx.lineTo(470, -260); ctx.lineTo(470, -220); ctx.lineTo(400, -200); ctx.fill();
                    ctx.fillStyle = '#d97706'; ctx.fillRect(425, -340, 20, 20);
                    ctx.fillStyle = '#854d0e'; ctx.beginPath(); ctx.arc(600, -250, 50, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillRect(585, -330, 30, 40); ctx.strokeRect(585, -330, 30, 40);
                    ctx.fillStyle = '#fef08a'; ctx.fillRect(580, -270, 40, 20);
                    ctx.fillStyle = '#000'; ctx.font = "bold 16px 'NeoDunggeunmo'"; ctx.fillText("X.O", 583, -255);
                    ctx.fillStyle = '#1e3a8a'; ctx.fillRect(100, -150, 40, 150); ctx.strokeRect(100, -150, 40, 150);
                    ctx.fillStyle = '#b91c1c'; ctx.fillRect(150, -170, 50, 170); ctx.strokeRect(150, -170, 50, 170);
                    ctx.fillStyle = '#fbbf24'; ctx.fillRect(160, -150, 30, 10);
                    ctx.fillStyle = '#166534'; ctx.fillRect(210, -120, 40, 120); ctx.strokeRect(210, -120, 40, 120);
                    ctx.fillStyle = '#94a3b8'; ctx.fillRect(450, -150, 250, 150); ctx.strokeRect(450, -150, 250, 150);
                    ctx.fillStyle = '#475569'; ctx.fillRect(470, -130, 210, 110); ctx.strokeRect(470, -130, 210, 110);
                    ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(520, -75, 20, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillRect(600, -85, 40, 20); ctx.strokeRect(600, -85, 40, 20);
                }, 800, 500);
            }
            draw() {
                let p = project(this.x, this.y, this.z);
                if (p.scale < 0) return;
                ctx.save(); ctx.translate(p.sx, p.sy); ctx.scale(p.scale, p.scale);
                ctx.drawImage(this.cachedCanvas, 0, -500);
                ctx.restore();
            }
        }

        class Plant {
            constructor() {
                this.x = -450; this.y = FLOOR_Y; this.z = 5550;
                this.cachedCanvas = SpriteCache.get('Plant', (ctx) => {
                    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
                    ctx.fillStyle = '#92400e'; ctx.beginPath(); ctx.moveTo(-40, 100); ctx.lineTo(40, 100); ctx.lineTo(50, 0); ctx.lineTo(-50, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#15803d'; ctx.beginPath(); ctx.arc(0, -50, 60, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(-50, -80, 50, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(50, -70, 55, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, -120, 50, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                }, 200, 300);
            }
            draw() {
                let p = project(this.x, this.y, this.z);
                if (p.scale < 0) return;
                ctx.save(); ctx.translate(p.sx, p.sy); ctx.scale(p.scale, p.scale);
                ctx.drawImage(this.cachedCanvas, -100, -200);
                ctx.restore();
            }
        }

        class GolfBag {
            constructor() {
                this.x = 650; this.y = FLOOR_Y; this.z = 6900;
                this.cachedCanvas = SpriteCache.get('GolfBag', (ctx) => {
                    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
                    ctx.fillStyle = '#b91c1c'; ctx.beginPath(); ctx.moveTo(-35, 300); ctx.lineTo(35, 300); ctx.lineTo(45, 100); ctx.lineTo(-25, 100); ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#111'; ctx.fillRect(-25, 120, 70, 25); ctx.fillRect(-15, 220, 40, 50);
                    ctx.fillStyle = '#ccc'; ctx.fillRect(-15, 40, 6, 60); ctx.strokeRect(-15, 40, 6, 60);
                    ctx.fillStyle = '#333'; ctx.fillRect(-20, 30, 16, 12); ctx.fillStyle = '#ccc'; ctx.fillRect(10, 50, 6, 50); ctx.strokeRect(10, 50, 6, 50);
                    ctx.fillStyle = '#333'; ctx.fillRect(5, 40, 16, 12); ctx.fillStyle = '#ccc'; ctx.fillRect(25, 70, 6, 30); ctx.strokeRect(25, 70, 6, 30);
                    ctx.fillStyle = '#333'; ctx.fillRect(20, 60, 16, 12);
                }, 150, 350);
            }
            draw() {
                let p = project(this.x, this.y, this.z);
                if (p.scale < 0) return;
                ctx.save(); ctx.translate(p.sx, p.sy); ctx.scale(p.scale, p.scale);
                ctx.drawImage(this.cachedCanvas, -75, -300);
                ctx.restore();
            }
        }

        class SideDesk {
            constructor(x, z, isLeft) {
                this.x = x; this.y = FLOOR_Y + 120; this.z = z; this.isLeft = isLeft;
            }
            draw() {
                let p = project(this.x, this.y, this.z);
                if (p.scale < 0) return;
                ctx.save(); ctx.translate(p.sx, p.sy); ctx.scale(p.scale, p.scale);
                ctx.lineWidth = 6; ctx.strokeStyle = '#000';
                ctx.fillStyle = '#b0c4de'; ctx.fillRect(-150, -20, 300, 120); ctx.strokeRect(-150, -20, 300, 120);
                ctx.strokeRect(-130, 0, 260, 40); ctx.strokeRect(-130, 50, 260, 40);
                ctx.fillStyle = '#e2e8f0'; ctx.fillRect(-80, -150, 160, 130); ctx.strokeRect(-80, -150, 160, 130);
                ctx.fillStyle = '#0ea5e9'; ctx.fillRect(-60, -130, 120, 90);
                ctx.fillStyle = '#bae6fd'; ctx.fillRect(-45, -110, 90, 10); ctx.fillRect(-45, -90, 60, 10); ctx.fillRect(-45, -70, 75, 10);
                ctx.fillStyle = '#cbd5e1'; ctx.fillRect(-70, -35, 140, 15); ctx.strokeRect(-70, -35, 140, 15);
                if (!this.isLeft) {
                    ctx.fillStyle = '#d97706'; ctx.fillRect(90, -70, 50, 50); ctx.strokeRect(90, -70, 50, 50);
                    ctx.fillStyle = '#22c55e'; ctx.fillRect(80, -140, 70, 70); ctx.strokeRect(80, -140, 70, 70);
                } else {
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(100, -80, 20, 60); ctx.strokeRect(100, -80, 20, 60);
                    ctx.fillStyle = '#3b82f6'; ctx.fillRect(125, -70, 15, 50); ctx.strokeRect(125, -70, 15, 50);
                }
                ctx.restore();
            }
        }

        class Desk {
            constructor() {
                this.z = 5400;
                this.cachedCanvas = SpriteCache.get('Desk', (ctx) => {
                    ctx.lineWidth = 8; ctx.strokeStyle = '#000';
                    ctx.fillStyle = '#526078'; ctx.fillRect(-350, 0, 700, 40); ctx.strokeRect(-350, 0, 700, 40);
                    ctx.fillStyle = '#404a5e'; ctx.fillRect(-330, 40, 660, 250); ctx.strokeRect(-330, 40, 660, 250);
                    ctx.fillStyle = '#000'; ctx.fillRect(-150, 80, 300, 100);
                    ctx.fillStyle = '#d19e48'; ctx.fillRect(-140, 90, 280, 80);
                    ctx.fillStyle = '#664919'; ctx.font = `bold 65px 'NeoDunggeunmo'`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('BOSS', 0, 135);
                    ctx.fillStyle = '#8e9eab'; ctx.fillRect(-280, -40, 40, 40); ctx.strokeRect(-280, -40, 40, 40);
                    ctx.fillStyle = '#e67e22'; ctx.fillRect(-275, -60, 10, 20); ctx.strokeRect(-275, -60, 10, 20);
                    ctx.fillStyle = '#2ecc71'; ctx.fillRect(-255, -70, 10, 30); ctx.strokeRect(-255, -70, 10, 30);
                    ctx.fillStyle = '#fff'; ctx.fillRect(180, -15, 90, 15); ctx.strokeRect(180, -15, 90, 15);

            draw() {

                if (p.scale < 0) return;
                ctx.save(); ctx.translate(p.sx, p.sy); ctx.scale(p.scale, p.scale);
                ctx.drawImage(this.cachedCanvas, -375, -20);
                ctx.restore();

        }

        class Boss {
            constructor() {
                this.x = 0; this.y = 80; this.z = 6000; this.radius = 180; this.hit = false; this.reactionTimer = 0;
                // 난이도 조절 변수: 기본 속도
                this.baseSpeed = 12;
                this.moveRange = 1000; // 책장 근처까지 가도록 범위 조정
                this.moveDir = 1;

                // 라운드별 투덜거림 / 칭찬 문구
                this.sarcasticTexts = [
                    "이게 최선이야?", "한눈에 안 들어오네. 다시.", "초등학생이 쓴 거 아니지?",
                    "고민한 흔적이 안 보이는데?", "감이 그렇게 안 오나?", "방향이 아예 틀렸어. 처음부터 다시.",
                    "내가 말한 거 이해 못 했어?", "이거... 수준이 좀 떨어지는데.",
                    "엣지가 없어. 알지? 그 느낌?", "주말에 뭐 했어? 생각 좀 더 해오지."
                ];
                this.praiseTexts = [
                    "오, 이번 건 좀 사람답게 써왔네?", "웬일이야? 해가 서쪽에서 뜨겠어.",
                    "자네, 하면 되는데 그동안 안 한 거지?", "내 생각보다 아주 조금 더 잘했네.",
                    "이제야 내 스타일을 좀 파악했나 봐?", "오~ 발전했어. 지난번엔 진짜 최악이었잖아.",
                    "이 정도면 어디 가서 내 부하직원이라고 해도 되겠어.", "역시 굴려야 제맛이라니까. 고생했어.",
                    "이 느낌이지! 근데 다음엔 더 잘할 수 있지?", "자네 없으면 일 어떻게 하나 몰라. (일 더 줄 예정)"
                ];
                this.currentHitText = '';
            }
            update() {
                if (!this.hit && currentRound > 1) {
                    // 1라운드는 가만히 있고, 라운드가 거듭될수록 빨라짐
                    let speedMultiplier = 1 + (currentRound - 2) * 0.5;
                    this.x += this.baseSpeed * speedMultiplier * this.moveDir;
                    if (this.x > this.moveRange) { this.x = this.moveRange; this.moveDir = -1; }
                    else if (this.x < -this.moveRange) { this.x = -this.moveRange; this.moveDir = 1; }
                }
            }
            draw() {
                let p = project(this.x, this.y, this.z);
                if (p.scale < 0) return;
                let idleY = this.hit ? 0 : Math.sin(Date.now() / 300) * 8;

        class Folder {

        class Paper {
            constructor(x, y, z, baseVx, baseVy, baseVz) {
                this.w = 96; this.h = 128; this.x = x; this.y = y; this.z = z;

                this.vy = Math.abs(baseVy * 0.3) + Math.random() * 60 + 20;
                this.vz = baseVz * 0.2 + (Math.random() - 0.5) * 150;

                this.flutterPhase = Math.random() * Math.PI * 2; this.flutterSpeed = 0.05 + Math.random() * 0.1;
                this.flipPhase = Math.random() * Math.PI * 2; this.flipSpeed = 0.05 + Math.random() * 0.1;

            }
            draw() {
                let p = project(this.x, this.y, this.z);

        class Particle {
            constructor(x, y, z) {
                this.x = x; this.y = y; this.z = z;

                const colors = ['#fbbf24', '#ef4444', '#ffffff', '#cbd5e1'];
                this.color = colors[Math.floor(Math.random() * colors.length)];

            update() { this.vy -= GRAVITY; this.x += this.vx; this.y += this.vy; this.z += this.vz; this.life -= 0.02; }
            draw() {
                if (this.life <= 0) return;

                    ctx.lineWidth = 2 * p.scale; ctx.strokeStyle = '#000'; ctx.strokeRect(p.sx - s / 2, p.sy - s / 2, s, s);
                    ctx.globalAlpha = 1.0;

        function initGame(fullReset = true) {
            state = 'idle'; failMessage = '';
            failOverlay.classList.remove('show');

        function explodeFolder(x, y, z, vx, vy, vz) {

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
        }

        let startY = 0, startX = 0, isDragging = false, dragDx = 0, dragDy = 0;
        function handleStart(e) {
            if (state !== 'idle') return;
            const pos = getCanvasPos(e);
            let p = project(folder.x, folder.y, folder.z);
            let hitW = folder.w * p.scale * 2.0; let hitH = folder.h * p.scale * 2.0;
            if (Math.abs(pos.x - p.sx) < hitW / 2 && Math.abs(pos.y - p.sy) < hitH / 2) { isDragging = true; startX = pos.x; startY = pos.y; dragDx = 0; dragDy = 0; }
        }
        function handleMove(e) {
            if (isDragging && state === 'idle') {
                const pos = getCanvasPos(e);
                let dx = pos.x - startX; let dy = pos.y - startY; if (dy < 0) dy = 0;
                const MAX_DRAG = 120; let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > MAX_DRAG) { dx = (dx / dist) * MAX_DRAG; dy = (dy / dist) * MAX_DRAG; }
                dragDx = dx; dragDy = dy; folder.x = folder.baseX + dx * 1.5; folder.y = folder.baseY - dy * 0.8; folder.z = folder.baseZ - dy * 3; folder.rotation = dx * 0.002;
            }
        }
        function handleEnd(e) {
            if (!isDragging || state !== 'idle') return;
            isDragging = false; let dist = Math.sqrt(dragDx * dragDx + dragDy * dragDy);
            if (dist > 20 && dragDy > 0) { state = 'flying'; folder.vx = -dragDx * 0.3; folder.vy = dragDy * 0.6; folder.vz = dragDy * 2.2; folder.rv = (Math.random() - 0.5) * 0.3; instruction.classList.add('hidden'); }
            else { folder.x = folder.baseX; folder.y = folder.baseY; folder.z = folder.baseZ; folder.rotation = 0; }
            dragDx = 0; dragDy = 0;
        }

        function drawIndicator() {
            if (!isDragging || state !== 'idle' || dragDy <= 5) return;
            let simX = folder.x; let simY = folder.y; let simZ = folder.z;
            let simVx = -dragDx * 0.3; let simVy = dragDy * 0.6; let simVz = dragDy * 2.2;
            ctx.fillStyle = '#ef4444';
            for (let i = 0; i < 90; i++) {
                simVy -= GRAVITY; simX += simVx; simY += simVy; simZ += simVz;

                // 더 촘촘하게 그리기 위해 i % 3 조건 제거하고 크기를 약간 줄임
                let currP = project(simX, simY, simZ); if (currP.scale < 0) break;
                let dotSize = 6 * currP.scale; ctx.fillRect(currP.sx - dotSize / 2, currP.sy - dotSize / 2, dotSize, dotSize);

                if (simZ >= boss.z) {
                    // 도착 지점에 동그라미 힌트 추가
                    ctx.save();
                    ctx.beginPath();
                    // 반지름을 150에서 60으로 줄임 (사용자 피드백 반영)
                    ctx.arc(currP.sx, currP.sy, 60 * currP.scale, 0, Math.PI * 2);
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 4 * currP.scale;
                    ctx.stroke();
                    // 안쪽을 살짝 채움
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                    ctx.fill();
                    ctx.restore();
                    return;
                }
            }
        }

        function drawRoomEnvironment() {
            ctx.fillStyle = '#829bb5'; ctx.fillRect(0, 0, width, height / 2);
            ctx.strokeStyle = '#627b95'; ctx.lineWidth = 2;
            for (let x = -4000; x <= 4000; x += 400) {
                let p1 = project(x, CEILING_Y, -500); let p2 = project(x, CEILING_Y, 8000);
                if (p1.scale > 0 && p2.scale > 0) { ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy); ctx.stroke(); }
            }
            for (let z = -200; z <= 8000; z += 400) {
                let p1 = project(-4000, CEILING_Y, z); let p2 = project(4000, CEILING_Y, z);
                if (p1.scale > 0 && p2.scale > 0) { ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy); ctx.stroke(); }
            }
            ctx.fillStyle = '#5180a5'; ctx.fillRect(0, height / 2, width, height / 2);
            ctx.strokeStyle = '#396383'; ctx.lineWidth = 2;
            for (let x = -4000; x <= 4000; x += 300) {
                let p1 = project(x, FLOOR_Y, -500); let p2 = project(x, FLOOR_Y, 8000);
                if (p1.scale > 0 && p2.scale > 0) { ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy); ctx.stroke(); }
            }
            for (let z = -200; z <= 8000; z += 300) {
                let p1 = project(-4000, FLOOR_Y, z); let p2 = project(4000, FLOOR_Y, z);
                if (p1.scale > 0 && p2.scale > 0) { ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy); ctx.stroke(); }
            }
            let gmTL = project(600, FLOOR_Y, 7200); let gmTR = project(800, FLOOR_Y, 7200);
            let gmBR = project(800, FLOOR_Y, 4800); let gmBL = project(600, FLOOR_Y, 4800);
            if (gmBL.scale > 0 && gmTL.scale > 0) {
                ctx.save(); ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.moveTo(gmTL.sx, gmTL.sy); ctx.lineTo(gmTR.sx, gmTR.sy); ctx.lineTo(gmBR.sx, gmBR.sy); ctx.lineTo(gmBL.sx, gmBL.sy); ctx.closePath(); ctx.fill();
                let hole = project(700, FLOOR_Y, 6750); ctx.fillStyle = '#000'; ctx.beginPath(); ctx.ellipse(hole.sx, hole.sy, 20 * hole.scale, 6 * hole.scale, 0, 0, Math.PI * 2); ctx.fill();
                let ball = project(700, FLOOR_Y, 5250); ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(ball.sx, ball.sy, 6 * ball.scale, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.restore();
            }
            // 천장 형광등
            const lightZs = [500, 1800, 3500, 5500];
            const lightXs = [-600, 0, 600];
            for (let lz of lightZs) {
                for (let lx of lightXs) {
                    let la = project(lx - 400, CEILING_Y, lz);
                    let lb = project(lx + 400, CEILING_Y, lz);
                    if (la.scale > 0 && lb.scale > 0) {
                        let lw = Math.abs(lb.sx - la.sx);
                        let lh = Math.max(4, 12 * la.scale);
                        let lx0 = Math.min(la.sx, lb.sx);
                        let ly0 = la.sy - lh / 2;
                        ctx.save();
                        // 형광등 몸체 (회색 케이스)
                        ctx.fillStyle = '#b0bec5'; ctx.strokeStyle = '#546e7a'; ctx.lineWidth = 2;
                        ctx.fillRect(lx0, ly0 - lh * 0.5, lw, lh * 1.5); ctx.strokeRect(lx0, ly0 - lh * 0.5, lw, lh * 1.5);
                        // 형광 빛 (밝은 흰색/노란색)
                        ctx.fillStyle = '#fffde7';
                        ctx.fillRect(lx0 + 2, ly0, lw - 4, lh * 0.8);
                        // 빛 번짐 효과
                        let grad = ctx.createLinearGradient(lx0, ly0 + lh, lx0, ly0 + lh * 8);
                        grad.addColorStop(0, 'rgba(255, 253, 200, 0.18)');
                        grad.addColorStop(1, 'rgba(255, 253, 200, 0)');
                        ctx.fillStyle = grad;
                        ctx.fillRect(lx0 - lw * 0.3, ly0 + lh, lw * 1.6, lh * 7);
                        ctx.restore();
                    }
                }
            }
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', (e) => {
            if (e.target.closest('#resetBtn') || e.target.closest('#home-btn')) return;
            e.preventDefault();
            handleStart(e);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (e.target.closest('#resetBtn') || e.target.closest('#home-btn')) return;
            e.preventDefault();
            handleMove(e);
        }, { passive: false });
        window.addEventListener('touchend', (e) => {
            if (e.target.closest('#resetBtn') || e.target.closest('#home-btn')) return;
            e.preventDefault();
            handleEnd(e);
        }, { passive: false });
        resetBtn.addEventListener('click', initGame);
        resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); initGame(); }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.key === '5') {
                currentRound = 5;
                initGame(false);
                instruction.innerText = `[CHEAT] ROUND 5로 스킵됨`;
            }
        });

        function animate() {
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, width, height);
            drawRoomEnvironment();
            if (boss) boss.update();
            if (folder) folder.update();
            papers.forEach(paper => paper.update());
            particles.forEach(p => p.update());
            let renderList = [];
            if (wall) renderList.push({ z: wall.z, obj: wall });
            if (boss) renderList.push({ z: boss.z, obj: boss });
            if (desk) renderList.push({ z: desk.z, obj: desk });
            if (plant) renderList.push({ z: plant.z, obj: plant });
            if (golfBag) renderList.push({ z: golfBag.z, obj: golfBag });
            sideDesks.forEach(sd => renderList.push({ z: sd.z, obj: sd }));
            cabinets.forEach(cab => renderList.push({ z: cab.z, obj: cab }));
            if (folder && state !== 'exploded' && state !== 'round_clear' && state !== 'game_clear') renderList.push({ z: folder.z, obj: folder });
            papers.forEach(p => renderList.push({ z: p.z, obj: p }));
            particles.forEach(p => renderList.push({ z: p.z, obj: p }));
            renderList.sort((a, b) => b.z - a.z);
            renderList.forEach(item => item.obj.draw());

            if (state === 'idle') drawIndicator();

            requestAnimationFrame(animate);
        }
        resize();
        animate();
    </script>
</body>

</html>
