<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부장님의 차돌박이</title>
    <meta property="og:title" content="부장님의 차돌박이">
    <meta property="og:description" content="종잇장처럼 얇게 딱 10장만 썰어오게! 부장님의 차돌박이 게임 썰기">
    <meta property="og:image" content="https://ttalggak-arcade.vercel.app/assets/images/thumb-brisket-master.png">
    <meta property="og:type" content="website">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
            touch-action: manipulation;
            /* 모바일 더블탭 줌 방지 */
        }

        .title-font {
            font-family: 'Black Han Sans', sans-serif;
        }

        /* 화면 흔들림 타격감 효과 */
        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg);
            }

            10% {
                transform: translate(-1px, -2px) rotate(-1deg);
            }

            20% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            30% {
                transform: translate(3px, 2px) rotate(0deg);
            }

            40% {
                transform: translate(1px, -1px) rotate(1deg);
            }

            50% {
                transform: translate(-1px, 2px) rotate(-1deg);
            }

            60% {
                transform: translate(-3px, 1px) rotate(0deg);
            }

            70% {
                transform: translate(3px, 1px) rotate(-1deg);
            }

            80% {
                transform: translate(-1px, -1px) rotate(1deg);
            }

            90% {
                transform: translate(1px, 2px) rotate(0deg);
            }

            100% {
                transform: translate(0px, 0px) rotate(0deg);
            }
        }

        .shake-active {
            animation: shake 0.2s cubic-bezier(.36, .07, .19, .97) both;
        }

        /* 칼날 번쩍임 효과 */
        @keyframes flash {
            0% {
                background-color: rgba(255, 255, 255, 0);
            }

            50% {
                background-color: rgba(255, 255, 255, 0.8);
            }

            100% {
                background-color: rgba(255, 255, 255, 0);
            }
        }

        .flash-active {
            animation: flash 0.15s ease-out;
        }

        /* 타이틀 둥둥 떠다니는 효과 */
        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg) scale(1);
            }

            50% {
                transform: translateY(-8px) rotate(2deg) scale(1.05);
            }

            100% {
                transform: translateY(0px) rotate(0deg) scale(1);
            }
        }

        .animate-float {
            animation: float 2.5s ease-in-out infinite;
        }

        /* 텍스트 테두리 (웹킷 전용) */
        .text-stroke-thick {
            -webkit-text-stroke: 3px #450a0a;
            /* 진한 붉은갈색 테두리 */
        }

        .text-stroke-thin {
            -webkit-text-stroke: 1.5px #000;
            /* 얇은 검은색 테두리 */
        }

        #game-container {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        canvas {
            image-rendering: pixelated;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-900 p-0 sm:p-4">

    <div id="game-container"
        class="relative w-full max-w-[400px] bg-[#e8d5c4] sm:rounded-2xl overflow-hidden sm:border-8 border-gray-800 shadow-2xl">

        <!-- 캔버스 영역 (세로형) -->
        <canvas id="gameCanvas" width="400" height="700" class="w-full h-auto block cursor-crosshair"></canvas>
        <div id="flash-overlay" class="absolute inset-0 pointer-events-none"></div>

        <!-- 뒤로가기 버튼 -->
        <a href="/"
            class="absolute top-4 right-4 z-30 bg-gray-800 text-white border-2 border-gray-600 p-2 rounded shadow-md active:scale-95 transition-transform drop-shadow-md flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>

        <!-- HUD: 점수 및 가이드 -->
        <div id="hud" class="absolute top-4 left-4 pointer-events-none z-10">
            <div class="text-2xl text-white title-font drop-shadow-md text-stroke-thin">
                연속 성공: <span id="scoreDisplay" class="text-yellow-400">0</span>
            </div>
            <div
                class="text-xs font-bold text-white mt-1 bg-black/50 px-2 py-1 rounded inline-block border border-gray-500/50">
                목표: 0.1 ~ 0.6mm
            </div>
        </div>
        <div class="absolute bottom-6 w-full text-center pointer-events-none z-10">
            <div
                class="inline-block text-gray-800 font-bold bg-white/90 px-4 py-2 rounded-full animate-pulse text-sm shadow-md border border-gray-300">
                화면 터치로 썰기!
            </div>
        </div>

        <!-- 시작 화면 -->
        <div id="startScreen"
            class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center text-center z-20 p-6">

            <!-- 화려한 타이틀 -->
            <div class="mb-8 animate-float flex flex-col items-center select-none">
                <div
                    class="text-3xl text-white title-font text-stroke-thin drop-shadow-[0_4px_4px_rgba(0,0,0,1)] tracking-widest mb-1 transform -rotate-3 z-10">
                    부장님의
                </div>
                <h1
                    class="text-7xl title-font text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 via-orange-500 to-red-600 text-stroke-thick filter drop-shadow-[0_8px_8px_rgba(0,0,0,0.8)] tracking-tighter relative -mt-2">
                    차돌박이
                </h1>
            </div>

            <!-- 부장님 & 말풍선 영역 -->
            <div class="flex flex-col items-center mb-8 w-full">
                <!-- 말풍선 -->
                <div
                    class="relative bg-white text-gray-800 p-4 rounded-2xl w-full max-w-sm font-bold text-lg shadow-lg mb-4 border-4 border-gray-300 break-keep">
                    "오늘 회식은 김사원이 직접 썰어주는 <span class="text-red-600">차돌박이</span>로 하세!<br>종잇장처럼 얇게 딱 <span
                        class="text-blue-600">10장</span>만 썰어오게!"
                    <!-- 말풍선 꼬리 -->
                    <div
                        class="absolute -bottom-3 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[12px] border-t-white z-10">
                    </div>
                    <div
                        class="absolute -bottom-[16px] left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[13px] border-l-transparent border-r-[13px] border-r-transparent border-t-[16px] border-t-gray-300">
                    </div>
                </div>

                <!-- 부장님 이미지 (기분 좋은 표정 - SVG로 직접 그리기) -->
                <div
                    class="w-28 h-28 bg-blue-100 rounded-full border-4 border-gray-300 overflow-hidden flex items-end justify-center pt-2 shadow-xl relative">
                    <svg viewBox="0 0 100 100" class="w-full h-full relative z-10">
                        <!-- 얼굴 (대머리) -->
                        <circle cx="50" cy="50" r="45" fill="#ffddc1" stroke="#333" stroke-width="3" />
                        <!-- 귀 -->
                        <circle cx="5" cy="50" r="10" fill="#ffddc1" stroke="#333" stroke-width="3" />
                        <circle cx="95" cy="50" r="10" fill="#ffddc1" stroke="#333" stroke-width="3" />
                        <!-- 옆머리 (검정) -->
                        <path d="M 10 35 Q 15 50 10 65 L 0 65 L 0 35 Z" fill="#222" />
                        <path d="M 90 35 Q 85 50 90 65 L 100 65 L 100 35 Z" fill="#222" />
                        <!-- 눈썹 -->
                        <path d="M 25 35 L 40 25" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round" />
                        <path d="M 75 35 L 60 25" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round" />
                        <!-- 안경 -->
                        <circle cx="35" cy="45" r="12" fill="white" stroke="#333" stroke-width="3" />
                        <circle cx="65" cy="45" r="12" fill="white" stroke="#333" stroke-width="3" />
                        <line x1="47" y1="45" x2="53" y2="45" stroke="#333" stroke-width="3" />
                        <!-- 눈알 -->
                        <circle cx="35" cy="45" r="4" fill="#333" />
                        <circle cx="65" cy="45" r="4" fill="#333" />
                        <!-- 콧수염 -->
                        <path d="M 35 60 Q 50 55 65 60" stroke="#222" stroke-width="6" fill="none"
                            stroke-linecap="round" />
                        <!-- 입 (킹받게 활짝 웃는) -->
                        <path d="M 25 70 Q 50 95 75 70 Z" fill="#d32f2f" stroke="#333" stroke-width="3" />
                        <path d="M 25 70 Q 50 80 75 70" fill="white" />
                        <!-- 셔츠 & 넥타이 -->
                        <path d="M 10 85 Q 50 100 90 85 L 90 100 L 10 100 Z" fill="white" stroke="#333"
                            stroke-width="3" />
                        <path d="M 50 85 L 40 100 L 60 100 Z" fill="#d32f2f" />
                    </svg>
                </div>

                <div
                    class="mt-4 text-yellow-300 font-bold text-sm bg-black/50 px-4 py-2 rounded-full border border-yellow-500/50">
                    목표 두께: 0.1 ~ 0.6mm
                </div>
            </div>

            <button id="startBtn"
                class="w-full py-4 bg-red-600 hover:bg-red-500 text-white text-2xl rounded-2xl shadow-lg transition transform hover:scale-105 active:scale-95 title-font tracking-wide">
                도전 시작
            </button>
        </div>

        <!-- 피드백 (결과) 모달 -->
        <div id="feedbackScreen"
            class="absolute inset-0 bg-black/60 hidden flex flex-col items-center justify-center z-20 p-6 backdrop-blur-sm">
            <div
                class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl transform transition-all scale-95 border-4 border-gray-800">
                <!-- 부장님 이미지 (SVG) -->
                <div id="bossBg" class="bg-red-100 h-32 flex items-end justify-center pt-4 relative overflow-hidden">
                    <!-- 화난/웃는 부장님 이미지 주입 영역 -->
                    <div id="bossFace" class="w-24 h-24 relative z-10 flex items-center justify-center"></div>
                </div>

                <div class="p-5 text-center">
                    <div id="resultThickness" class="text-3xl text-gray-800 title-font mb-2">두께: 1.5mm</div>
                    <div id="resultStatus"
                        class="text-lg font-bold text-red-600 mb-3 inline-block px-3 py-1 rounded-full bg-red-100">실패
                    </div>

                    <!-- 킹받는 대사 -->
                    <p id="bossDialogue"
                        class="text-base text-gray-700 font-bold mb-5 min-h-[3.5rem] bg-gray-100 p-3 rounded-lg border border-gray-200 shadow-inner break-keep">
                        "이게 차돌박이냐? 거의 냉동 삼겹살 수준인데?"
                    </p>

                    <button id="nextBtn"
                        class="w-full py-3 bg-gray-800 hover:bg-gray-700 text-white font-bold text-lg rounded-xl shadow-md transition transform hover:scale-105 active:scale-95">
                        다시 썰기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { trackPlayCount } from '../../api-playcount.js';

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const feedbackScreen = document.getElementById('feedbackScreen');
        const nextBtn = document.getElementById('nextBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const gameContainer = document.getElementById('game-container');
        const flashOverlay = document.getElementById('flash-overlay');

        // UI Elements
        const resultThickness = document.getElementById('resultThickness');
        const bossDialogue = document.getElementById('bossDialogue');
        const bossFace = document.getElementById('bossFace');
        const bossBg = document.getElementById('bossBg');
        const resultStatus = document.getElementById('resultStatus');

        // 게임 상태
        let gameState = 'START'; // START, PLAYING, CUTTING, FEEDBACK
        let score = 0;
        let animationId;

        // 시간 기반 애니메이션
        let lastTime = 0;

        // 게임 오브젝트 설정
        const knifeX = 280; // 칼이 떨어질 X 좌표 (세로 화면에 맞춰 조정)

        const meat = {
            w: 220, // 덩어리 길이 증가 (시각적으로 약 3~4cm 길이로 보이게)
            h: 150, // 정면 시점을 위해 높이 증가
            x: -250,
            y: 400, // 도마 표면 위치 (550 - 150)
            baseSpeed: 180, // 속도 대폭 상향 (기존 110 -> 180)
            currentSpeed: 180,
            sliced: false,
            sliceX: 0,
            // 잘린 조각 애니메이션을 위한 물리 속성
            piece: { active: false, x: 0, y: 0, w: 0, h: 0, vx: 0, vy: 0, rotation: 0, vr: 0 }
        };

        const knife = {
            y: -750,
            targetY: -750,
            w: 8, // 칼날 얇게 변경 (기존 30 -> 8)
            h: 650 // 정면 시점을 위해 칼날 길이 대폭 증가
        };

        // 부장님 SVG 자산 (킹받는 표정들) - 시작 화면과 동일한 베이스로 통일
        const bossFaces = {
            // 킹받게 활짝 웃는 (기본 - 성공)
            happy: `<svg viewBox="0 0 100 100" class="w-full h-full relative z-10">
                <circle cx="50" cy="50" r="45" fill="#ffddc1" stroke="#333" stroke-width="3"/>
                <circle cx="5" cy="50" r="10" fill="#ffddc1" stroke="#333" stroke-width="3"/>
                <circle cx="95" cy="50" r="10" fill="#ffddc1" stroke="#333" stroke-width="3"/>
                <path d="M 10 35 Q 15 50 10 65 L 0 65 L 0 35 Z" fill="#222"/>
                <path d="M 90 35 Q 85 50 90 65 L 100 65 L 100 35 Z" fill="#222"/>
                <path d="M 25 35 L 40 25" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 75 35 L 60 25" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                <circle cx="35" cy="45" r="12" fill="white" stroke="#333" stroke-width="3"/>
                <circle cx="65" cy="45" r="12" fill="white" stroke="#333" stroke-width="3"/>
                <line x1="47" y1="45" x2="53" y2="45" stroke="#333" stroke-width="3"/>
                <circle cx="35" cy="45" r="4" fill="#333"/>
                <circle cx="65" cy="45" r="4" fill="#333"/>
                <path d="M 35 60 Q 50 55 65 60" stroke="#222" stroke-width="6" fill="none" stroke-linecap="round"/>
                <path d="M 25 70 Q 50 95 75 70 Z" fill="#d32f2f" stroke="#333" stroke-width="3"/>
                <path d="M 25 70 Q 50 80 75 70" fill="white"/>
                <path d="M 10 85 Q 50 100 90 85 L 90 100 L 10 100 Z" fill="white" stroke="#333" stroke-width="3"/>
                <path d="M 50 85 L 40 100 L 60 100 Z" fill="#d32f2f"/>
            </svg>`,
            // 화난 표정 (실패)
            angry: `<svg viewBox="0 0 100 100" class="w-full h-full relative z-10">
                <circle cx="50" cy="50" r="45" fill="#ffddc1" stroke="#333" stroke-width="3"/>
                <circle cx="5" cy="50" r="10" fill="#ffddc1" stroke="#333" stroke-width="3"/>
                <circle cx="95" cy="50" r="10" fill="#ffddc1" stroke="#333" stroke-width="3"/>
                <path d="M 10 35 Q 15 50 10 65 L 0 65 L 0 35 Z" fill="#222"/>
                <path d="M 90 35 Q 85 50 90 65 L 100 65 L 100 35 Z" fill="#222"/>
                <path d="M 20 25 L 40 35" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 80 25 L 60 35" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                <circle cx="35" cy="45" r="12" fill="white" stroke="#333" stroke-width="3"/>
                <circle cx="65" cy="45" r="12" fill="white" stroke="#333" stroke-width="3"/>
                <line x1="47" y1="45" x2="53" y2="45" stroke="#333" stroke-width="3"/>
                <circle cx="35" cy="45" r="4" fill="#333"/>
                <circle cx="65" cy="45" r="4" fill="#333"/>
                <path d="M 35 60 Q 50 55 65 60" stroke="#222" stroke-width="6" fill="none" stroke-linecap="round"/>
                <path d="M 35 75 Q 50 70 65 75" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 10 85 Q 50 100 90 85 L 90 100 L 10 100 Z" fill="white" stroke="#333" stroke-width="3"/>
                <path d="M 50 85 L 40 100 L 60 100 Z" fill="#d32f2f"/>
            </svg>`,
            // 불쾌한 표정 (어이없음)
            disgusted: `<svg viewBox="0 0 100 100" class="w-full h-full relative z-10">
                <circle cx="50" cy="50" r="45" fill="#ffddc1" stroke="#333" stroke-width="3"/>
                <circle cx="5" cy="50" r="10" fill="#ffddc1" stroke="#333" stroke-width="3"/>
                <circle cx="95" cy="50" r="10" fill="#ffddc1" stroke="#333" stroke-width="3"/>
                <path d="M 10 35 Q 15 50 10 65 L 0 65 L 0 35 Z" fill="#222"/>
                <path d="M 90 35 Q 85 50 90 65 L 100 65 L 100 35 Z" fill="#222"/>
                <path d="M 25 35 L 40 35" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 75 35 L 60 35" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                <circle cx="35" cy="45" r="12" fill="white" stroke="#333" stroke-width="3"/>
                <circle cx="65" cy="45" r="12" fill="white" stroke="#333" stroke-width="3"/>
                <line x1="47" y1="45" x2="53" y2="45" stroke="#333" stroke-width="3"/>
                <circle cx="35" cy="45" r="4" fill="#333"/>
                <circle cx="65" cy="45" r="4" fill="#333"/>
                <path d="M 35 60 Q 50 55 65 60" stroke="#222" stroke-width="6" fill="none" stroke-linecap="round"/>
                <path d="M 40 75 Q 50 70 60 75 L 55 80 Z" fill="#333"/>
                <path d="M 10 85 Q 50 100 90 85 L 90 100 L 10 100 Z" fill="white" stroke="#333" stroke-width="3"/>
                <path d="M 50 85 L 40 100 L 60 100 Z" fill="#d32f2f"/>
            </svg>`
        };

        // 초기화
        function init() {
            startBtn.addEventListener('click', () => {
                trackPlayCount("brisket-master");
                resetGame(true);
            });
            nextBtn.addEventListener('click', () => {
                resetGame(resultStatus.innerText === '실패' || resultStatus.innerText === 'CLEAR!');
            });

            // 입력 이벤트 (클릭 및 스페이스바)
            window.addEventListener('mousedown', (e) => {
                if (e.target.closest('button') || e.target.closest('a')) return;
                handleInput();
            });
            window.addEventListener('touchstart', (e) => {
                if (e.target.closest('button') || e.target.closest('a')) return;
                e.preventDefault();
                handleInput();
            }, { passive: false });
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    handleInput();
                }
            });

            // 초기 렌더링
            draw();
        }

        function resetGame(resetScore) {
            if (resetScore) {
                score = 0;
                scoreDisplay.innerText = score;
            }
            startScreen.classList.add('hidden');
            feedbackScreen.classList.add('hidden');

            meat.x = -meat.w - 100;
            meat.sliced = false;
            meat.piece.active = false; // 조각 초기화
            knife.y = -750;
            knife.targetY = -750;

            // 난이도 조절: 점수에 따라 기본 속도 증가 (화면 비율에 맞게 조정)
            meat.baseSpeed = 180 + (score * 60); // 10장 도달 시 엄청난 속도를 위해 가속폭 대폭 상향

            gameState = 'PLAYING';
            lastTime = performance.now();
            cancelAnimationFrame(animationId);
            gameLoop(lastTime);
        }

        function handleInput() {
            if (gameState === 'PLAYING') {
                performSlice();
            } else if (gameState === 'FEEDBACK') {
                resetGame(resultStatus.innerText === '실패' || resultStatus.innerText === 'CLEAR!');
            }
        }

        function performSlice() {
            gameState = 'CUTTING';
            knife.targetY = -80; // 칼 끝(630)이 도마 표면(550)에 닿도록 목표 위치 설정 (-80 + 630 = 550)

            // 화면 흔들림 & 번쩍임 효과
            gameContainer.classList.remove('shake-active');
            void gameContainer.offsetWidth; // DOM Reflow 트리거
            gameContainer.classList.add('shake-active');

            flashOverlay.classList.remove('flash-active');
            void flashOverlay.offsetWidth;
            flashOverlay.classList.add('flash-active');

            evaluateCut();
        }

        function evaluateCut() {
            // 두께 계산
            // 고기는 왼쪽에서 오른쪽으로 이동. 먼저 칼에 닿는 부분은 고기의 오른쪽 끝(meat.x + meat.w).
            const meatRightEdge = meat.x + meat.w;
            let sliceThicknessPx = meatRightEdge - knifeX;
            let thicknessMm = 0;
            let status = '';
            let msg = '';
            let face = bossFaces.angry;
            let isSuccess = false;

            // 픽셀 -> mm 변환 비율 (약 1px = 0.1mm). 엄청 얇게 썰어야 인정!
            const pxToMm = 0.1;

            if (sliceThicknessPx < 0) {
                // 허공 썰기 (고기가 아직 칼 위치에 안 옴)
                thicknessMm = 0;
                status = '실패';
                msg = "허공에 칼질하나? 고기가 아직 안 왔네.";
                face = bossFaces.disgusted;
            } else if (meat.x > knifeX) {
                // 고기가 이미 칼을 완전히 지나감
                thicknessMm = 999;
                status = '실패';
                msg = "어허! 고기 다 지나갔잖아! 눈은 장식인가?";
                face = bossFaces.angry;
            } else {
                // 정상 절단 범위
                meat.sliced = true;
                meat.sliceX = knifeX; // 잘린 위치 기록

                // 잘린 조각 물리 애니메이션 세팅
                meat.piece.active = true;
                meat.piece.x = knifeX;
                meat.piece.y = meat.y;
                meat.piece.w = Math.max(1, sliceThicknessPx); // 0 두께 방지
                meat.piece.h = meat.h;

                // 얇으면(차돌박이) 가볍게 날아가고, 두꺼우면 묵직하게 떨어짐
                const isThin = sliceThicknessPx < 10; // 약 1.0mm 이하
                meat.piece.vx = isThin ? 150 + Math.random() * 80 : 50 + Math.random() * 30; // 우측으로 튕겨나감
                meat.piece.vy = isThin ? -350 - Math.random() * 100 : -150; // 위로 높게 튀어오름
                meat.piece.rotation = 0;
                meat.piece.vr = isThin ? (Math.random() * 12 + 8) : (Math.random() * 3 + 1); // 얇을수록 많이 회전

                // 두께 계산 (최소 0.1mm)
                thicknessMm = Math.max(0.1, sliceThicknessPx * pxToMm);
                thicknessMm = Math.round(thicknessMm * 10) / 10; // 소수점 첫째자리

                if (thicknessMm >= 0.1 && thicknessMm <= 0.6) {
                    status = '성공';
                    msg = "오~ 종잇장처럼 얇은 완벽한 차돌박이야!";
                    face = bossFaces.happy;
                    isSuccess = true;
                } else if (thicknessMm >= 0.7 && thicknessMm <= 2.0) {
                    status = '실패';
                    msg = "조금만 더 얇게 썰어! 아직 구이용 삼겹살이잖아!";
                    face = bossFaces.angry;
                } else if (thicknessMm >= 2.1 && thicknessMm <= 5.0) {
                    status = '실패';
                    msg = "허허... 스테이크를 썰어놨네?";
                    face = bossFaces.disgusted;
                } else {
                    status = '실패';
                    msg = "이건 수육이잖아! 고기 낭비할래?";
                    face = bossFaces.angry;
                }
            }

            // UI 세팅
            setTimeout(() => {
                showFeedback(thicknessMm, status, msg, face, isSuccess);
            }, 600); // 칼 내리찍는 모션 후 팝업
        }

        function showFeedback(mm, status, msg, face, isSuccess) {
            gameState = 'FEEDBACK';
            feedbackScreen.classList.remove('hidden');

            if (isSuccess) {
                score++;
                scoreDisplay.innerText = score;

                if (score >= 10) {
                    // 10장 클리어 달성!
                    resultThickness.innerText = "10장 달성!";
                    resultStatus.innerText = "CLEAR!";
                    bossDialogue.innerHTML = `"역시 김사원 자네야!<br>근데 10장이면 누구 코에 붙이나?<br>100장 썰게!"`;
                    bossFace.innerHTML = bossFaces.happy;

                    resultStatus.className = 'text-xl font-bold text-yellow-600 mb-4 inline-block px-3 py-1 rounded-full bg-yellow-100 animate-bounce';
                    bossBg.className = 'bg-yellow-100 h-40 flex items-end justify-center pt-6 relative overflow-hidden';
                    nextBtn.innerText = "처음부터 다시 하기 ↺";
                    nextBtn.className = 'w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-white font-bold text-xl rounded-xl shadow-md transition transform hover:scale-105 active:scale-95';
                } else {
                    // 일반 성공
                    resultThickness.innerText = mm === 0 ? "허공 가르기!" : (mm >= 999 ? "놓침!" : `두께: ${mm}mm`);
                    resultStatus.innerText = status;
                    bossDialogue.innerHTML = `"${msg}"`;
                    bossFace.innerHTML = face;

                    resultStatus.className = 'text-xl font-bold text-blue-600 mb-4 inline-block px-3 py-1 rounded-full bg-blue-100';
                    bossBg.className = 'bg-blue-100 h-40 flex items-end justify-center pt-6 relative overflow-hidden';
                    nextBtn.innerText = "다음 고기 썰기 ➜";
                    nextBtn.className = 'w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold text-xl rounded-xl shadow-md transition transform hover:scale-105 active:scale-95';
                }
            } else {
                // 실패
                resultThickness.innerText = mm === 0 ? "허공 가르기!" : (mm >= 999 ? "놓침!" : `두께: ${mm}mm`);
                resultStatus.innerText = status;
                bossDialogue.innerHTML = `"${msg}"`;
                bossFace.innerHTML = face;

                resultStatus.className = 'text-xl font-bold text-red-600 mb-4 inline-block px-3 py-1 rounded-full bg-red-100';
                bossBg.className = 'bg-red-100 h-40 flex items-end justify-center pt-6 relative overflow-hidden';
                nextBtn.innerText = "다시 도전하기 ↺";
                nextBtn.className = 'w-full py-4 bg-gray-800 hover:bg-gray-700 text-white font-bold text-xl rounded-xl shadow-md transition transform hover:scale-105 active:scale-95';
            }
        }

        function gameLoop(currentTime) {
            if (gameState !== 'START') {
                animationId = requestAnimationFrame(gameLoop);
            }

            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            update(deltaTime);
            draw();
        }

        function update(dt) {
            if (gameState === 'PLAYING') {
                // 난이도 기믹: 점수가 3점 이상이면 고기 속도가 불규칙해짐 (사인파 활용)
                if (score >= 3) {
                    meat.currentSpeed = meat.baseSpeed + Math.sin(Date.now() / 150) * (score * 10);
                } else {
                    meat.currentSpeed = meat.baseSpeed;
                }

                meat.x += meat.currentSpeed * dt;

                // 고기가 화면을 완전히 지나가면 자동 실패 처리
                if (meat.x > canvas.width + 50) {
                    performSlice(); // 빈 칼질 강제 실행
                }
            }

            // 칼 애니메이션 부드럽게 (Lerp)
            knife.y += (knife.targetY - knife.y) * 20 * dt; // 속도 상향 (타격감)

            // 잘린 후 우측 고기 조각 물리 애니메이션 (바닥 충돌 포함)
            if (gameState === 'CUTTING' && meat.piece.active) {
                meat.piece.vy += 1200 * dt; // 중력 가속도
                meat.piece.x += meat.piece.vx * dt;
                meat.piece.y += meat.piece.vy * dt;
                meat.piece.rotation += meat.piece.vr * dt;

                // 도마 표면(550) 바닥 충돌 처리
                if (meat.piece.y + meat.piece.h > 550) {
                    meat.piece.y = 550 - meat.piece.h; // 바닥에 안착
                    meat.piece.vy = -meat.piece.vy * 0.3; // 통통 튀김 (탄성)
                    meat.piece.vx *= 0.8; // 마찰력
                    meat.piece.vr *= 0.8; // 회전 마찰력
                }
            }
        }

        function draw() {
            // 배경 지우기
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 정면 시점 (Eye-level) 팝아트 감성 액션 배경 (스피드 라인)
            ctx.fillStyle = '#1e3a8a'; // 눈이 편안하면서 고기와 대비되는 짙은 파란색
            ctx.fillRect(0, 0, canvas.width, 550);

            ctx.fillStyle = 'rgba(255, 222, 0, 0.4)'; // 스피드 라인 투명도 조절로 눈부심 완화
            const speedLineOffset = (Date.now() * 0.8) % canvas.width;
            for (let i = 0; i < 12; i++) {
                const lineY = (i * 45) + 20;
                const lineWidth = 80 + (Math.sin(i * 10) * 50);
                const lineX = (speedLineOffset * (1 + (i % 3) * 0.3) + i * 90) % (canvas.width + 200) - 200;
                ctx.fillRect(lineX, lineY, lineWidth, 6 + (i % 2) * 4);
            }

            // 정면 시점 도마(Cutting Board) 그리기
            // 도마 상단 엣지 (B급 감성에 맞춘 과장된 컬러와 테두리)
            ctx.fillStyle = '#ffb347';
            ctx.fillRect(0, 550, canvas.width, 15);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 546, canvas.width, 4); // 상단 굵은 선
            ctx.fillRect(0, 565, canvas.width, 4); // 중간 굵은 선

            // 도마 측면
            ctx.fillStyle = '#ff9100';
            ctx.fillRect(0, 569, canvas.width, canvas.height - 569);

            // 도마 측면 과장된 무늬 (두꺼운 선)
            ctx.fillStyle = '#cc7400';
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(0, 590 + i * 40, canvas.width, 8);
            }

            // 목표 선 (칼이 내려오는 위치 가이드) - 형광 녹색
            ctx.beginPath();
            ctx.setLineDash([12, 12]);
            ctx.moveTo(knifeX, 0);
            ctx.lineTo(knifeX, 550);
            ctx.strokeStyle = '#39ff14'; // 네온 그린
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.setLineDash([]);

            // 고기 그리기
            if (!meat.sliced) {
                drawMeatBlock(meat.x, meat.y, meat.w, meat.h);
            } else {
                // 잘린 상태
                const leftWidth = meat.sliceX - meat.x;

                if (leftWidth > 0) {
                    // 왼쪽 본체
                    drawMeatBlock(meat.x, meat.y, leftWidth, meat.h, true);
                }
                if (meat.piece.active && meat.piece.w > 0) {
                    // 오른쪽 썰린 조각 (회전하며 날아가는 연출)
                    ctx.save();
                    // 조각의 중앙을 기준으로 회전
                    ctx.translate(meat.piece.x + meat.piece.w / 2, meat.piece.y + meat.piece.h / 2);
                    ctx.rotate(meat.piece.rotation);
                    drawMeatBlock(-meat.piece.w / 2, -meat.piece.h / 2, meat.piece.w, meat.piece.h, false, true);
                    ctx.restore();
                }
            }

            // 식칼 그리기 (칼날 너비를 고려해 중앙 정렬)
            drawKnife(knifeX - (knife.w / 2), knife.y);
        }

        // 고기 덩어리 렌더링 함수
        function drawMeatBlock(x, y, w, h, isLeftEnd = false, isRightEnd = false) {
            if (w <= 0) return; // 너비 0 이하 방어코드
            ctx.save();
            ctx.translate(x, y);

            // 고기 베이스 (그라데이션으로 리얼한 질감 추가)
            const meatGrad = ctx.createLinearGradient(0, 0, 0, h);
            meatGrad.addColorStop(0, '#ff1744'); // 강렬한 레드
            meatGrad.addColorStop(0.6, '#d50000'); // 중간
            meatGrad.addColorStop(1, '#b71c1c'); // 어두운 바닥

            ctx.fillStyle = meatGrad;
            ctx.beginPath();

            // 모서리 둥글게 (정면 시점이므로 바닥은 평평하게, 위쪽만 둥글게)
            const topR = 12;
            const bottomR = 0; // 도마에 완벽히 밀착
            if (!isLeftEnd && !isRightEnd) {
                ctx.roundRect(0, 0, w, h, [topR, topR, bottomR, bottomR]);
            } else if (isLeftEnd) {
                ctx.roundRect(0, 0, w, h, [topR, 0, bottomR, bottomR]);
            } else if (isRightEnd) {
                ctx.roundRect(0, 0, w, h, [0, topR, bottomR, bottomR]);
            }
            ctx.fill();

            // 마블링 및 디테일 렌더링을 위해 클리핑 마스크 생성
            ctx.clip();

            // 굵은 마블링 (지방선) - 정면 측면의 층 형태
            ctx.strokeStyle = '#ffcdd2'; // 핑크빛 감도는 하얀 지방
            ctx.lineWidth = 6; // 선 두께 증가 (팝아트 감성)
            ctx.lineCap = 'round';
            ctx.beginPath();
            for (let i = -50; i < w + 50; i += 40) {
                ctx.moveTo(i, h * 0.1);
                // 수평/사선에 가까운 지방층 패턴으로 변경
                ctx.bezierCurveTo(i + 30, h * 0.4, i - 10, h * 0.6, i + 40, h * 0.9);
            }
            ctx.stroke();

            // 상단 떡지방 (겉면 지방층)
            ctx.fillStyle = '#fff9c4'; // 노란빛 도는 떡지방
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(w, 0);
            ctx.lineTo(w, 15);
            for (let i = w; i >= 0; i -= 15) {
                ctx.lineTo(i, 12 + Math.sin(i) * 5); // 불규칙한 지방 두께
            }
            ctx.fill();

            // 입체감 테두리 (B급 팝아트 감성에 맞춰 두껍고 까맣게)
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.restore();
        }

        // 식칼 렌더링 함수
        function drawKnife(x, y) {
            ctx.save();
            ctx.translate(x, y);

            // 얇은 칼날 베이스 (정면 시점에 맞춰 길이 650으로 증가)
            ctx.fillStyle = '#b0b5b9';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(knife.w, 0);
            ctx.lineTo(knife.w, 650);
            ctx.lineTo(0, 630); // 비스듬하고 뾰족한 칼끝
            ctx.closePath();
            ctx.fill();

            // 칼날 날 선 부분 (빛 반사로 예리함 강조)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(knife.w - 2, 0);
            ctx.lineTo(knife.w, 0);
            ctx.lineTo(knife.w, 650);
            ctx.lineTo(knife.w - 2, 640);
            ctx.closePath();
            ctx.fill();

            // 칼날 팝아트 외곽선
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(knife.w, 0);
            ctx.lineTo(knife.w, 650);
            ctx.lineTo(0, 630);
            ctx.closePath();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 손잡이 (정면 뷰에 맞게 위치 유지)
            ctx.fillStyle = '#1c1c1c';
            ctx.fillRect(-6, -90, 20, 90);
            ctx.strokeRect(-6, -90, 20, 90); // 손잡이 굵은 테두리

            // 손잡이 리벳
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(4, -70, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(4, -45, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(4, -20, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

            ctx.restore();
        }

        // 게임 시작
        window.onload = init;

    </script>
</body>
